<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Trash Container - Blog de Brenda</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("blog_2.jpeg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            /* Cristal blanco más pulido */
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        h1 {
            font-weight: 600;
            font-size: 2.8rem;
            margin-top: 0;
            color: #000000; /* Blanco para que resalte con el estilo moderno */
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
            letter-spacing: -1px;
        }

        /* Estilo bonito para la lista de poemas */
        ul {
            list-style: none;
            padding: 0;
            margin: 40px 0;
        }

        li {
            margin: 15px 0;
            transition: transform 0.3s ease;
        }

        li a {
            text-decoration: none;
            color: #000000;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            font-weight: 400;
        }

        li a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .back-link {
            text-decoration: none;
            color: rgba(0, 0, 0, 0.8);
            font-weight: 400;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #000000;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

<div class="container">
    <span class="icon">🧠</span>
    <h1>Trash Container</h1>
    
    <ul>
        <li><a href="trash_1.html">Sobre la importancia de escribir en diarios </a></li>
        <li><a href="trash_2.html">What I bring to the table: walking, trees and a random nostalgia </a></li>
    </ul>
    
    <a href="index.html" class="back-link">⬅ Volver al inicio</a>
</div>

</body>
</html>
